# =========================================================
# AWS SAM TEMPLATE
# Event Driven File Processing Pipeline
#
# Arquitectura:
#
# User Upload
#      |
#      v
#     S3
#      |
#      v
#     SQS
#      |
#      v
#  Lambda Worker (.NET)
#      |
#      v
#  DynamoDB
#
# Incluye:
# - DLQ para resiliencia
# - IAM Least Privilege
# - Bucket seguro (no público)
# - Infrastructure as Code
# =========================================================


AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Event Driven File Processing Pipeline

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: dotnet10

Resources:

# ================= IAM ROLE =================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub file-processing-worker-role-${AWS::StackName}

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      Policies:

        - PolicyName: LambdaSQSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt FileProcessingQueue.Arn

        - PolicyName: LambdaDynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:DescribeTable
                Resource: !GetAtt FileMetadataTable.Arn

        - PolicyName: LambdaS3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectAttributes
                Resource: !Sub ${FileUploadBucket.Arn}/*

              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt FileUploadBucket.Arn

        - PolicyName: LambdaLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

# ================= SQS DLQ =================
  FileProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: file-processing-dlq

# ================= SQS QUEUE =================
  FileProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: file-processing-queue
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FileProcessingDLQ.Arn
        maxReceiveCount: 3

# ================= SQS POLICY =================
  FileProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref FileProcessingQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt FileProcessingQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

# ================= S3 BUCKET =================
  FileUploadBucket:
    Type: AWS::S3::Bucket
    #DeletionPolicy: Retain
    #UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub file-upload-serverless-${AWS::AccountId}-bucket

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:Put
            Queue: !GetAtt FileProcessingQueue.Arn

# ================= DYNAMODB =================
  FileMetadataTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: file-metadata-serverless
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S

      KeySchema:
        - AttributeName: Id
          KeyType: HASH

# ================= LAMBDA =================
  FileProcessingWorker:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: file-processing-worker
      # ReservedConcurrentExecutions: 2

      CodeUri: src/FileProcessingWorker
      Handler: FileProcessingWorker::FileProcessingWorker.Function::FunctionHandler
      Role: !GetAtt LambdaExecutionRole.Arn

      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt FileProcessingQueue.Arn
            BatchSize: 5

# ================= LOG GROUP =================
  FileProcessingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/file-processing-worker
      RetentionInDays: 14

Outputs:

  FileUploadBucketName:
    Value: !Ref FileUploadBucket

  FileProcessingQueueUrl:
    Value: !Ref FileProcessingQueue

  FileProcessingWorkerArn:
    Value: !GetAtt FileProcessingWorker.Arn

  FileMetadataTableName:
    Value: !Ref FileMetadataTable